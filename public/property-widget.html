<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: transparent;
    color: #1a1a2e;
    padding: 12px;
  }
  .controls {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 12px;
    align-items: center;
  }
  .controls select, .controls input, .controls button {
    padding: 7px 12px;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    font-size: 13px;
    background: #fff;
    color: #1a1a2e;
    outline: none;
  }
  .controls select:focus, .controls input:focus {
    border-color: #6366f1;
    box-shadow: 0 0 0 2px rgba(99,102,241,0.15);
  }
  .controls button {
    cursor: pointer;
    background: #6366f1;
    color: #fff;
    border: none;
    font-weight: 600;
    transition: background 0.2s;
  }
  .controls button:hover { background: #4f46e5; }
  .controls button.secondary {
    background: #f3f4f6;
    color: #374151;
    border: 1px solid #d1d5db;
  }
  .controls button.secondary:hover { background: #e5e7eb; }
  .controls button.secondary.active {
    background: #6366f1;
    color: #fff;
    border-color: #6366f1;
  }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
  }
  .badge-sale { background: #dcfce7; color: #166534; }
  .badge-rent { background: #dbeafe; color: #1e40af; }
  .results-info {
    font-size: 13px;
    color: #6b7280;
    margin-bottom: 8px;
  }

  /* Grid View */
  .grid-view {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
  }
  .card {
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 12px;
    overflow: hidden;
    transition: box-shadow 0.2s, transform 0.15s;
    cursor: pointer;
  }
  .card:hover {
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    transform: translateY(-2px);
  }
  .card-img {
    width: 100%;
    height: 160px;
    object-fit: cover;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 28px;
    position: relative;
  }
  .card-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .card-body {
    padding: 12px;
  }
  .card-price {
    font-size: 20px;
    font-weight: 700;
    color: #1a1a2e;
    margin-bottom: 4px;
  }
  .card-address {
    font-size: 13px;
    color: #6b7280;
    margin-bottom: 8px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-features {
    display: flex;
    gap: 12px;
    font-size: 12px;
    color: #4b5563;
  }
  .card-features span {
    display: flex;
    align-items: center;
    gap: 3px;
  }
  .card-type {
    position: absolute;
    top: 8px;
    left: 8px;
  }

  /* List View */
  .list-view .card {
    display: flex;
    flex-direction: row;
  }
  .list-view .card-img {
    width: 200px;
    min-width: 200px;
    height: 120px;
  }
  .list-view .card-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  /* Detail Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.visible { display: flex; }
  .modal {
    background: #fff;
    border-radius: 16px;
    max-width: 600px;
    width: 100%;
    max-height: 80vh;
    overflow-y: auto;
    padding: 24px;
    position: relative;
  }
  .modal-close {
    position: absolute;
    top: 12px;
    right: 16px;
    background: none;
    border: none;
    font-size: 22px;
    cursor: pointer;
    color: #6b7280;
    padding: 4px;
    line-height: 1;
  }
  .modal h2 { font-size: 22px; margin-bottom: 4px; }
  .modal .detail-price { font-size: 26px; font-weight: 700; color: #6366f1; margin: 8px 0; }
  .modal .detail-address { color: #6b7280; margin-bottom: 12px; font-size: 14px; }
  .modal .detail-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin: 12px 0;
  }
  .modal .detail-item {
    background: #f9fafb;
    padding: 10px;
    border-radius: 8px;
  }
  .modal .detail-item label {
    font-size: 11px;
    text-transform: uppercase;
    color: #9ca3af;
    display: block;
    margin-bottom: 2px;
  }
  .modal .detail-item span {
    font-size: 15px;
    font-weight: 600;
    color: #1a1a2e;
  }
  .modal .detail-desc {
    margin-top: 12px;
    font-size: 14px;
    color: #4b5563;
    line-height: 1.5;
  }
  .no-results {
    text-align: center;
    padding: 40px;
    color: #9ca3af;
    font-size: 15px;
  }
  .loading {
    text-align: center;
    padding: 40px;
    color: #6366f1;
  }
  .loading .spinner {
    width: 32px; height: 32px;
    border: 3px solid #e5e7eb;
    border-top-color: #6366f1;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <div class="controls" id="controls">
    <select id="sortBy" title="Sort listings">
      <option value="price-asc">Price: Low to High</option>
      <option value="price-desc">Price: High to Low</option>
      <option value="beds-desc">Most Bedrooms</option>
      <option value="sqft-desc">Largest Area</option>
    </select>
    <select id="filterType" title="Filter by type">
      <option value="all">All Types</option>
      <option value="Residential">Residential</option>
      <option value="Condominium">Condo</option>
      <option value="RES">RES</option>
    </select>
    <input type="number" id="minPrice" placeholder="Min $" style="width:90px" />
    <input type="number" id="maxPrice" placeholder="Max $" style="width:90px" />
    <input type="number" id="minBeds" placeholder="Beds+" style="width:70px" />
    <button onclick="applyFilters()">Apply</button>
    <button class="secondary" id="gridBtn" onclick="setView('grid')">Grid</button>
    <button class="secondary active" id="listBtn" onclick="setView('list')">List</button>
  </div>

  <div class="results-info" id="resultsInfo"></div>
  <div id="container" class="list-view"></div>

  <div class="modal-overlay" id="modal" onclick="closeModal(event)">
    <div class="modal" id="modalContent"></div>
  </div>

  <div class="loading" id="loading" style="display:none">
    <div class="spinner"></div>
    <div>Loading properties...</div>
  </div>

<script>
  let allProperties = [];
  let filteredProperties = [];
  let currentView = 'list';

  function init() {
    // Try multiple data sources: window.openai.toolOutput, injected data, or structuredContent
    const data = window.openai?.toolOutput || window.__PROPERTY_DATA__ || window.openai?.structuredContent;
    if (data && data.properties) {
      allProperties = data.properties;
      filteredProperties = [...allProperties];
      applyFilters();
    } else {
      document.getElementById('container').innerHTML =
        '<div class="no-results">No properties found. Ask the agent to search for listings!</div>';
    }

    // Restore state
    const state = window.openai?.widgetState;
    if (state) {
      if (state.view) setView(state.view, false);
      if (state.sortBy) document.getElementById('sortBy').value = state.sortBy;
      if (state.filterType) document.getElementById('filterType').value = state.filterType;
      if (state.minPrice) document.getElementById('minPrice').value = state.minPrice;
      if (state.maxPrice) document.getElementById('maxPrice').value = state.maxPrice;
      if (state.minBeds) document.getElementById('minBeds').value = state.minBeds;
      applyFilters();
    }
  }

  function saveState() {
    if (window.openai?.setWidgetState) {
      window.openai.setWidgetState({
        view: currentView,
        sortBy: document.getElementById('sortBy').value,
        filterType: document.getElementById('filterType').value,
        minPrice: document.getElementById('minPrice').value,
        maxPrice: document.getElementById('maxPrice').value,
        minBeds: document.getElementById('minBeds').value,
      });
    }
  }

  function setView(view, save = true) {
    currentView = view;
    const container = document.getElementById('container');
    container.className = view === 'grid' ? 'grid-view' : 'list-view';
    document.getElementById('gridBtn').classList.toggle('active', view === 'grid');
    document.getElementById('listBtn').classList.toggle('active', view === 'list');
    if (save) saveState();
  }

  function applyFilters() {
    const sortBy = document.getElementById('sortBy').value;
    const filterType = document.getElementById('filterType').value;
    const minPrice = parseInt(document.getElementById('minPrice').value) || 0;
    const maxPrice = parseInt(document.getElementById('maxPrice').value) || Infinity;
    const minBeds = parseInt(document.getElementById('minBeds').value) || 0;

    filteredProperties = allProperties.filter(p => {
      if (filterType !== 'all' && p.type !== filterType) return false;
      if (p.price < minPrice || p.price > maxPrice) return false;
      if ((p.bedrooms || 0) < minBeds) return false;
      return true;
    });

    // Sort
    filteredProperties.sort((a, b) => {
      switch (sortBy) {
        case 'price-asc': return a.price - b.price;
        case 'price-desc': return b.price - a.price;
        case 'beds-desc': return (b.bedrooms || 0) - (a.bedrooms || 0);
        case 'sqft-desc': return (b.sqft || 0) - (a.sqft || 0);
        default: return 0;
      }
    });

    renderProperties();
    saveState();
  }

  function formatPrice(price) {
    if (price >= 1000000) return '$' + (price / 1000000).toFixed(1) + 'M';
    if (price >= 1000) return '$' + (price / 1000).toFixed(0) + 'K';
    return '$' + price.toLocaleString();
  }

  function renderProperties() {
    const container = document.getElementById('container');
    const info = document.getElementById('resultsInfo');
    info.textContent = filteredProperties.length + ' of ' + allProperties.length + ' properties shown';

    if (filteredProperties.length === 0) {
      container.innerHTML = '<div class="no-results">No properties match your filters. Try adjusting them.</div>';
      return;
    }

    container.innerHTML = filteredProperties.map((p, i) => {
      const typeClass = p.listingType === 'Lease' ? 'badge-rent' : 'badge-sale';
      const typeLabel = p.listingType === 'Lease' ? 'Rent' : 'Sale';
      const photoHtml = p.photo
        ? '<img src="' + p.photo + '" alt="' + (p.address || 'Property') + '" onerror="this.parentElement.innerHTML=\'🏠\'" />'
        : '🏠';
      return '<div class="card" onclick="showDetail(' + i + ')">' +
        '<div class="card-img">' + photoHtml +
          '<span class="card-type badge ' + typeClass + '">' + typeLabel + '</span>' +
        '</div>' +
        '<div class="card-body">' +
          '<div class="card-price">' + formatPrice(p.price) + '</div>' +
          '<div class="card-address">' + (p.address || 'Address N/A') + '</div>' +
          '<div class="card-features">' +
            '<span>🛏 ' + (p.bedrooms || '-') + ' bd</span>' +
            '<span>🚿 ' + (p.bathrooms || '-') + ' ba</span>' +
            '<span>📐 ' + (p.sqft ? p.sqft.toLocaleString() + ' sqft' : '-') + '</span>' +
          '</div>' +
        '</div>' +
      '</div>';
    }).join('');

    if (window.openai?.notifyIntrinsicHeight) {
      setTimeout(() => {
        window.openai.notifyIntrinsicHeight(document.body.scrollHeight);
      }, 100);
    }
  }

  function showDetail(idx) {
    const p = filteredProperties[idx];
    if (!p) return;
    const modal = document.getElementById('modal');
    const content = document.getElementById('modalContent');
    const typeClass = p.listingType === 'Lease' ? 'badge-rent' : 'badge-sale';
    const typeLabel = p.listingType === 'Lease' ? 'For Rent' : 'For Sale';

    content.innerHTML =
      '<button class="modal-close" onclick="closeModal()">&times;</button>' +
      '<span class="badge ' + typeClass + '">' + typeLabel + '</span>' +
      '<h2>' + (p.address || 'Property') + '</h2>' +
      '<div class="detail-price">' + formatPrice(p.price) + '</div>' +
      '<div class="detail-address">' + (p.city || '') + ', ' + (p.state || '') + ' ' + (p.zip || '') + '</div>' +
      '<div class="detail-grid">' +
        '<div class="detail-item"><label>Bedrooms</label><span>' + (p.bedrooms || '-') + '</span></div>' +
        '<div class="detail-item"><label>Bathrooms</label><span>' + (p.bathrooms || '-') + '</span></div>' +
        '<div class="detail-item"><label>Sq Ft</label><span>' + (p.sqft ? p.sqft.toLocaleString() : '-') + '</span></div>' +
        '<div class="detail-item"><label>Type</label><span>' + (p.type || '-') + '</span></div>' +
        '<div class="detail-item"><label>Year Built</label><span>' + (p.yearBuilt || '-') + '</span></div>' +
        '<div class="detail-item"><label>Lot Size</label><span>' + (p.lotSize ? p.lotSize.toLocaleString() + ' sqft' : '-') + '</span></div>' +
      '</div>' +
      (p.description ? '<div class="detail-desc">' + p.description + '</div>' : '') +
      (p.mlsId ? '<div style="margin-top:12px;font-size:12px;color:#9ca3af">MLS# ' + p.mlsId + '</div>' : '');

    modal.classList.add('visible');
  }

  function closeModal(e) {
    if (e && e.target !== document.getElementById('modal')) return;
    document.getElementById('modal').classList.remove('visible');
  }

  // Init on load
  init();
</script>
</body>
</html>
