<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Property Explorer</title>
  <style>
    :root { color: #0b0b0f; font-family: "Inter", system-ui, -apple-system, sans-serif; }
    html, body { width: 100%; min-height: 100%; box-sizing: border-box; }
    body { margin: 0; padding: 16px; background: #f6f8fb; }
    main { width: 100%; max-width: 800px; margin: 0 auto; background: #fff; border-radius: 16px; padding: 20px; box-shadow: 0 12px 24px rgba(15,23,42,0.08); }
    h2 { margin: 0 0 12px; font-size: 1.25rem; }

    .controls { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
    .controls select, .controls input { padding: 8px 10px; border: 1px solid #cad3e0; border-radius: 10px; font-size: 0.9rem; }
    .controls button { border: none; border-radius: 10px; background: #111bf5; color: white; font-weight: 600; padding: 8px 16px; cursor: pointer; }
    .controls button.secondary { background: #f2f4fb; color: #0b0b0f; border: 1px solid #cad3e0; }
    .controls button.secondary.active { background: #111bf5; color: white; border-color: #111bf5; }

    .info { font-size: 0.85rem; color: #6c768a; margin-bottom: 8px; }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; }
    .list .card { display: flex; flex-direction: row; }
    .list .card-img { width: 180px; min-width: 180px; height: 110px; }

    .card { background: #f2f4fb; border-radius: 12px; overflow: hidden; cursor: pointer; transition: box-shadow 0.2s, transform 0.15s; }
    .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.1); transform: translateY(-2px); }
    .card-img { height: 140px; background: linear-gradient(135deg, #667eea, #764ba2); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 28px; position: relative; }
    .card-img img { width: 100%; height: 100%; object-fit: cover; }
    .card-body { padding: 12px; flex: 1; }
    .card-price { font-size: 1.15rem; font-weight: 700; margin-bottom: 2px; }
    .card-addr { font-size: 0.8rem; color: #6c768a; margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-features { display: flex; gap: 10px; font-size: 0.75rem; color: #4b5563; }
    .badge { position: absolute; top: 6px; left: 6px; padding: 2px 8px; border-radius: 10px; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; }
    .badge-sale { background: #dcfce7; color: #166534; }
    .badge-rent { background: #dbeafe; color: #1e40af; }

    .modal-bg { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
    .modal-bg.open { display: flex; }
    .modal { background: #fff; border-radius: 16px; max-width: 520px; width: 100%; max-height: 80vh; overflow-y: auto; padding: 24px; position: relative; }
    .modal-close { position: absolute; top: 10px; right: 14px; background: none; border: none; font-size: 20px; cursor: pointer; color: #6c768a; }
    .modal h3 { margin: 0 0 4px; font-size: 1.1rem; }
    .modal .price { font-size: 1.3rem; font-weight: 700; color: #111bf5; margin: 6px 0; }
    .modal .addr { color: #6c768a; font-size: 0.85rem; margin-bottom: 12px; }
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 12px 0; }
    .detail-item { background: #f6f8fb; padding: 10px; border-radius: 10px; }
    .detail-item small { font-size: 0.65rem; text-transform: uppercase; color: #9ca3af; display: block; margin-bottom: 2px; }
    .detail-item strong { font-size: 0.95rem; }
    .no-results { text-align: center; padding: 40px; color: #9ca3af; }
  </style>
</head>
<body>
  <main>
    <h2>Property Explorer</h2>
    <div class="controls">
      <select id="sortBy">
        <option value="price-asc">Price: Low to High</option>
        <option value="price-desc">Price: High to Low</option>
        <option value="beds-desc">Most Bedrooms</option>
        <option value="sqft-desc">Largest Area</option>
      </select>
      <select id="filterType">
        <option value="all">All Types</option>
        <option value="Residential">Residential</option>
        <option value="Condominium">Condo</option>
      </select>
      <input type="number" id="minPrice" placeholder="Min $" style="width:80px" />
      <input type="number" id="maxPrice" placeholder="Max $" style="width:80px" />
      <input type="number" id="minBeds" placeholder="Beds+" style="width:60px" />
      <button onclick="applyFilters()">Filter</button>
      <button class="secondary" id="gridBtn" onclick="setView('grid')">Grid</button>
      <button class="secondary active" id="listBtn" onclick="setView('list')">List</button>
    </div>
    <div class="info" id="info"></div>
    <div id="container" class="list"></div>
  </main>

  <div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()">
    <div class="modal" id="modal"></div>
  </div>

  <script type="module">
    let allProperties = [...(window.openai?.toolOutput?.properties ?? [])];
    let filtered = [...allProperties];
    let view = 'list';

    const handleSetGlobals = (event) => {
      const globals = event.detail?.globals;
      if (!globals?.toolOutput?.properties) return;
      allProperties = globals.toolOutput.properties;
      applyFilters();
    };
    window.addEventListener("openai:set_globals", handleSetGlobals, { passive: true });

    function fmt(p) {
      if (p >= 1e6) return '$' + (p/1e6).toFixed(1) + 'M';
      if (p >= 1e3) return '$' + (p/1e3).toFixed(0) + 'K';
      return '$' + p;
    }

    window.setView = function(v) {
      view = v;
      document.getElementById('container').className = v;
      document.getElementById('gridBtn').classList.toggle('active', v === 'grid');
      document.getElementById('listBtn').classList.toggle('active', v === 'list');
    };

    window.applyFilters = function() {
      const sort = document.getElementById('sortBy').value;
      const type = document.getElementById('filterType').value;
      const minP = parseInt(document.getElementById('minPrice').value) || 0;
      const maxP = parseInt(document.getElementById('maxPrice').value) || Infinity;
      const minB = parseInt(document.getElementById('minBeds').value) || 0;

      filtered = allProperties.filter(p => {
        if (type !== 'all' && p.type !== type) return false;
        if (p.price < minP || p.price > maxP) return false;
        if (p.bedrooms < minB) return false;
        return true;
      });

      filtered.sort((a, b) => {
        if (sort === 'price-asc') return a.price - b.price;
        if (sort === 'price-desc') return b.price - a.price;
        if (sort === 'beds-desc') return b.bedrooms - a.bedrooms;
        if (sort === 'sqft-desc') return (b.sqft||0) - (a.sqft||0);
        return 0;
      });

      render();
    };

    window.showDetail = function(i) {
      const p = filtered[i];
      if (!p) return;
      document.getElementById('modal').innerHTML = `
        <button class="modal-close" onclick="closeModal()">&times;</button>
        <span class="badge ${p.listingType==='Lease'?'badge-rent':'badge-sale'}">${p.listingType==='Lease'?'Rent':'Sale'}</span>
        <h3>${esc(p.address)}</h3>
        <div class="price">${fmt(p.price)}</div>
        <div class="addr">${esc(p.city)}, ${esc(p.state)} ${esc(p.zip)}</div>
        <div class="detail-grid">
          <div class="detail-item"><small>Bedrooms</small><strong>${p.bedrooms||'-'}</strong></div>
          <div class="detail-item"><small>Bathrooms</small><strong>${p.bathrooms||'-'}</strong></div>
          <div class="detail-item"><small>Sq Ft</small><strong>${p.sqft?p.sqft.toLocaleString():'-'}</strong></div>
          <div class="detail-item"><small>Type</small><strong>${esc(p.type||'-')}</strong></div>
          <div class="detail-item"><small>Year Built</small><strong>${p.yearBuilt||'-'}</strong></div>
          <div class="detail-item"><small>Lot Size</small><strong>${p.lotSize?p.lotSize.toLocaleString()+' sqft':'-'}</strong></div>
        </div>
        ${p.description?`<p style="font-size:0.85rem;color:#4b5563;line-height:1.5">${esc(p.description.substring(0,300))}...</p>`:''}
        ${p.mlsId?`<p style="font-size:0.7rem;color:#9ca3af">MLS# ${p.mlsId}</p>`:''}
      `;
      document.getElementById('modalBg').classList.add('open');
    };

    window.closeModal = function() {
      document.getElementById('modalBg').classList.remove('open');
    };

    function esc(s) {
      if (!s) return '';
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function render() {
      const el = document.getElementById('container');
      document.getElementById('info').textContent = `${filtered.length} of ${allProperties.length} properties`;

      if (!filtered.length) {
        el.innerHTML = '<div class="no-results">No properties match filters.</div>';
        return;
      }

      el.innerHTML = filtered.map((p, i) => `
        <div class="card" onclick="showDetail(${i})">
          <div class="card-img">
            ${p.photo ? `<img src="${esc(p.photo)}" alt="${esc(p.address)}" onerror="this.parentElement.innerHTML='🏠'" />` : '🏠'}
            <span class="badge ${p.listingType==='Lease'?'badge-rent':'badge-sale'}">${p.listingType==='Lease'?'Rent':'Sale'}</span>
          </div>
          <div class="card-body">
            <div class="card-price">${fmt(p.price)}</div>
            <div class="card-addr">${esc(p.address)}</div>
            <div class="card-features">
              <span>🛏 ${p.bedrooms||'-'} bd</span>
              <span>🚿 ${p.bathrooms||'-'} ba</span>
              <span>📐 ${p.sqft?p.sqft.toLocaleString()+' sqft':'-'}</span>
            </div>
          </div>
        </div>
      `).join('');
    }

    render();
  </script>
</body>
</html>
